<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeldaTracker</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/ui.js"></script>
  </head>
  <body>
    <header class="header">
      <article class="hidden card modal" id="modal">
        <h1 class="page__title">Confirmación</h1>
        <p class="card__description" id="modal__description"></p>
        <section class="modal__buttons">
          <p class="card__description"></p>
          <button class="deleteButton--big" id="modal__cancel">Cancelar</button
          ><button class="card__button" id="modal__accept">Aceptar</button>
        </section>
      </article>
      <h1 class="page__title">ZeldaTracker</h1>
      <nav>
        <ul class="nav__list">
          <li>
            <a href="index.html" class="nav__list--element">Inicio</a>
          </li>
          <li>
            <a href="catalog.html" class="nav__list--element">Catálogo</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main__content">
      <section class="params__section">
        <article class="filters">
          <h2 class="article__title">Filtros</h2>
          <label class="filter__label"
            ><input type="checkbox" name="game" class="filter" />Juegos</label
          ><label class="filter__label">
            <input
              type="checkbox"
              name="dungeon"
              class="filter"
            />Mazmorras</label
          >
          <label class="filter__label"
            ><input
              type="checkbox"
              name="character"
              class="filter"
            />Personajes</label
          ><label class="filter__label"
            ><input type="checkbox" name="monster" />Monstruos</label
          ><label class="filter__label"
            ><input type="checkbox" name="boss" class="filter" />Jefes</label
          ><label class="filter__label"
            ><input type="checkbox" name="place" class="filter" />Lugares</label
          ><label class="filter__label"
            ><input type="checkbox" name="item" class="filter" />Objetos</label
          >
        </article>
        <article class="order__options">
          <h2 class="article__title">Orden</h2>
          <button class="order__button" id="newFirst">Nuevos -> Viejos</button
          ><button class="order__button" id="oldFirst">Viejos -> Nuevos</button
          ><button class="order__button" id="Z-A">Z-A</button
          ><button class="order__button" id="A-Z">A-Z</button>
        </article>
      </section>

      <section class="deleteSection">
        <button class="deleteButton" id="all">Borrar todo</button>
      </section>
      <section class="favorites__section">
        <article class="card" id="empty">
          <h1 class="card__title">No hay nada aquí</h1>
          <p class="card__description">
            ¡Busca algo en la página de inicio y añadelo a favoritos para que
            aparezca!
          </p>
        </article>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">ZeldaTracker | Made in 2026</p>
    </footer>
  </body>
</html>
