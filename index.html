<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeldaTracker</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">ZeldaTracker</h1>
      <section class="icon__section">
        <img class="icon" src="assets/logo.webp" alt="" />
      </section>
      <nav>
        <ul class="nav__list">
          <li class="nav__list--element">Favoritos</li>
        </ul>
      </nav>
    </header>
    <main class="main__content">
      <section class="search__section">
        <search>
          <input type="text" name="searchbar" id="searchbar" />
          <select name="searchtarget" id="searchtarget">
            <option value="all">Todas</option>
            <option value="staff">Desarrolladores</option>
            <option value="characters">Personajes</option>
            <option value="monsters">Monstruos</option>
            <option value="places">Lugares</option>
            <option value="dungeons">Mazmorras</option>
            <option value="bosses">Jefes</option>
            <option value="items">Objetos</option>
            <option value="games">Juegos</option>
          </select>
        </search>
      </section>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
