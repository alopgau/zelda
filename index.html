<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeldaTracker</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/ui.js"></script>
  </head>
  <body>
    <header class="header">
      <article class="hidden card modal" id="modal">
        <h1 class="page__title">Confirmación</h1>
        <p class="card__description" id="modal__description"></p>
        <section class="modal__buttons">
          <p class="card__description"></p>
          <button class="deleteButton--big" id="modal__cancel">Cancelar</button
          ><button class="card__button" id="modal__accept">Aceptar</button>
        </section>
      </article>
      <h1 class="page__title">ZeldaTracker</h1>
      <nav>
        <ul class="nav__list">
          <li>
            <a href="catalog.html" class="nav__list--element">Catálogo</a>
          </li>

          <li>
            <a href="favorites.html" class="nav__list--element">Favoritos</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="main__content">
      <section class="search__section">
        <h1 class="title">
          Bienvenido héroe! Como sabrás, es peligroso ir solo por Hyrule, pero
          no temas, hemos creado este buscador para guiarte!
        </h1>
        <search class="search">
          <form action="" method="get" class="search">
            <input
              type="text"
              name="searchbar"
              id="searchbar"
              class="searchbar"
            />
            <article class="option-checker">
              <label class="option-checker__label">
                <input
                  class="option-checker__option"
                  type="checkbox"
                  name="games"
                  id="games"
                  value="games"
                />
                Juegos
              </label>

              <label class="option-checker__label">
                <input
                  class="option-checker__option"
                  type="checkbox"
                  name="dungeons"
                  id="dungeons"
                  value="dungeons"
                />
                Mazmorras
              </label>

              <label class="option-checker__label">
                <input
                  class="option-checker__option"
                  type="checkbox"
                  name="characters"
                  id="characters"
                  value="characters"
                />
                Personajes
              </label>

              <label class="option-checker__label">
                <input
                  class="option-checker__option"
                  type="checkbox"
                  name="monsters"
                  id="monsters"
                  value="monsters"
                />
                Monstruos
              </label>

              <label class="option-checker__label">
                <input
                  class="option-checker__option"
                  type="checkbox"
                  name="bosses"
                  id="bosses"
                  value="bosses"
                />
                Jefes
              </label>

              <label class="option-checker__label">
                <input
                  class="option-checker__option"
                  type="checkbox"
                  name="places"
                  id="places"
                  value="places"
                />
                Lugares
              </label>

              <label class="option-checker__label">
                <input
                  class="option-checker__option"
                  type="checkbox"
                  name="items"
                  id="items"
                  value="items"
                />
                Objetos
              </label>
            </article>
          </form>
        </search>
      </section>
      <section class="search__results"></section>
    </main>
    <footer class="footer">
      <p class="footer__text">ZeldaTracker | Made in 2026</p>
    </footer>
  </body>
</html>
