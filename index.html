<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeldaTracker</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">ZeldaTracker</h1>
      <nav>
        <ul class="nav__list">
          <li>
            <a href="favoritos.html" class="nav__list--element">Favoritos</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="main__content">
      <section class="search__section">
        <search class="search">
          <input
            type="text"
            name="searchbar"
            id="searchbar"
            class="searchbar"
          />
          <select name="searchtarget" id="searchtarget" class="searchtarget">
            <option value="all">Todas</option>
            <option value="staff">Desarrolladores</option>
            <option value="characters">Personajes</option>
            <option value="monsters">Monstruos</option>
            <option value="places">Lugares</option>
            <option value="dungeons">Mazmorras</option>
            <option value="bosses">Jefes</option>
            <option value="items">Objetos</option>
            <option value="games">Juegos</option>
          </select>
        </search>
      </section>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
