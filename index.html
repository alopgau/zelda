<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeldaTracker</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/ui.js"></script>
  </head>
  <body>
    <header class="header">
      <h1 class="page__title">ZeldaTracker</h1>
      <nav>
        <ul class="nav__list">
          <li>
            <a href="favoritos.html" class="nav__list--element">Favoritos</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="main__content">
      <section class="welcome__section"></section>
      <section class="search__section">
        <h1 class="title">
          Bienvenido héroe! Como sabrás, es peligroso ir solo por Hyrule, pero
          no temas, hemos creado este buscador para guiarte!
        </h1>
        <search class="search">
          <form action="" method="get" class="search">
            <input
              type="text"
              name="searchbar"
              id="searchbar"
              class="searchbar"
            />
            <article class="option__checker">
              <label for="">
                <input type="checkbox" name="games" id="games">
                Juegos
              </label>
              
              <label for="">
                <input type="checkbox" name="staff" id="staff">
                Desarrolladores
              </label>
              
              <label for="">
                <input type="checkbox" name="dungeons" id="dungeons">
                Mazmorras
              </label>
              
              <label for="">
                <input type="checkbox" name="characters" id="characters">
                Personajes
              </label>
              <label for="">
                <input type="checkbox" name="monsters" id="monsters">
                Monstruos
              </label>
              
              <label for="">
                <input type="checkbox" name="bosses" id="bosses">
                Jefes
              </label>

              <label for="">
                <input type="checkbox" name="places" id="places">
                Lugares
              </label>

              <label for="">
                <input type="checkbox" name="items" id="items">
                Objetos
              </label>
            </article>
          </form>
        </search>
      </section>
      <section class="search__results"></section>
    </main>
    <footer class="footer">
      <p class="footer__text">ZeldaTracker | Made in 2026</p>
    </footer>
  </body>
</html>
